name: cd-gcp-frontend

on:
  # Allows manual triggering directly from the Actions tab in GitHub
  workflow_dispatch:
  push:
    # Triggers whenever a new version tag starting with v... is pushed
    tags:
      - 'v**'

jobs:
  deploy-frontend:
    name: Build & Deploy Frontend to Cloud Run
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 1. Authenticate to Google Cloud
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # 2. Configure Docker to push to Google Artifact Registry
      - name: Set up Cloud SDK & Docker Login
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # 3. Build multi-stage Dockerfile and push image to Artifact Registry
      - name: Build and push image to Artifact Registry
        env:
          GCP_REGION: us-central1
          GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          REPOSITORY: fragments
          IMAGE_NAME: fragments-frontend
          VERSION_TAG: ${{ github.ref_name }}
        uses: docker/build-push-action@v6
        with:
          push: true
          # Specify that the build context and Dockerfile are inside the app/ folder:
          context: ./app
          file: ./app/Dockerfile
          tags: |
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION_TAG }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:latest

      # 4. Deploy container image to Google Cloud Run
      - name: Deploy Frontend to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: fragments-frontend-service
          region: us-central1
          image: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/fragments/fragments-frontend:${{ github.ref_name }}
          # Expose port 80 to match Nginx's port in your Dockerfile
          flags: '--port=80 --allow-unauthenticated'