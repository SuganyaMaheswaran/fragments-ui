<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Fragments UI</title>
  <link rel="stylesheet" href="https://unpkg.com/bamboo.css" />
  <link rel="stylesheet" href="./style.css">
 
<script src="https://kit.fontawesome.com/11b166fcfa.js" crossorigin="anonymous"></script>
  <!-- Highlight.js for YAML / code highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

  <!-- Marked.js for Markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script type="module" src="./app.js"></script>
</head>

<body>
  <section class="header">
    <div class="header_title">
      <h1>Fragments UI</h1>
    </div>

    <div class="header_nav">
      <button class="header_btn btn_login" id="login">Login</button>
      <button class="header_btn btn_logout" id="logout">Logout</button>
    </div>
  </section>

  <section id="user" hidden>
    <div>
      <h2>Hello <span class="username"></span>!</h2>
      <button class="btn_add-Fragment" id="addFragment">Add Fragment</button>
    </div>

    <!-- Hidden by default -->
    <form id="fragmentForm" hidden>
      <h2>Add Fragment</h2>

      <label for="type">Select Content Type:</label>
      <select id="type" name="type" required>

      </select>
        <div id="containerUploadContent">
        <!-- Dynamic textarea or file input will appear here -->
      </div>

      <button type="submit">Save Fragment</button>
    </form>

 

  
  </section>

    <!--fragment pop up-->

     <!-- Fragment Table -->
    <section id="fragmentsTableSection" hidden >
      <h2>Your Fragments</h2>
      <table id="fragmentsTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Type</th>
            <th>Size</th>
            <th>Created</th>
            <th>Updated</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
<div id="customAlert" >
  
  <div >
    <span id="customAlertClose" style="float:right; cursor:pointer;">✖</span>
    
    <div id="customAlertContent"></div>
  </div>
</div>


</body>
</html>
